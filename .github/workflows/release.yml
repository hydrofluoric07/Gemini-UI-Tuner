name: Release Extension

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./chrome-extension/manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          cd chrome-extension
          zip -r "../Gemini-UI-Tuner-v${{ steps.version.outputs.version }}.zip" .

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Gemini UI Tuner ${{ steps.version.outputs.tag }}
          files: Gemini-UI-Tuner-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          make_latest: true

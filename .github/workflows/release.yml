name: Release Extension

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./chrome-extension/manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update language registry
        run: |
          node tools/build-language-builder.mjs --skip-pages --update-extension-registry

      - name: Package extension
        run: |
          cd chrome-extension
          zip -r "../Gemini-UI-Tuner-v${{ steps.version.outputs.version }}.zip" .

      - name: Build language builder
        run: |
          node tools/build-language-builder.mjs --out .pages

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Gemini UI Tuner ${{ steps.version.outputs.tag }}
          files: Gemini-UI-Tuner-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          make_latest: true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

      - name: Deploy Pages
        uses: actions/deploy-pages@v4
